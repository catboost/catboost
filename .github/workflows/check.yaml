name: Check build and tests

# Disabled: This workflow is inherited from the upstream CatBoost project and
# requires the full build infrastructure (CMake, Docker, CUDA, JDK, etc.)
# which is not present in this MLX-only fork.  See mlx_test.yaml for CI.
on:
  workflow_dispatch:  # manual-only — never triggers automatically

jobs:
  check:
    name: Check per OS
    strategy:
      matrix:
        os: [linux, macos, windows]
      fail-fast: false
    with:
      os: ${{ matrix.os }}
      artifacts_version: ${{ github.sha }}
      catboost_package_version: 1.2.10
    uses: ./.github/workflows/check_per_os.yaml
