name: MLX Build & Test

on:
  push:
    branches: [master]
    paths:
      - 'catboost/mlx/**'
      - 'python/**'
  pull_request:
    paths:
      - 'catboost/mlx/**'
      - 'python/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-14  # Apple M1, Metal GPU
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install MLX
        run: brew install mlx

      - name: Compile csv_train
        run: |
          MLX_PREFIX=$(brew --prefix mlx)
          clang++ -std=c++17 -O2 -I. \
            -I${MLX_PREFIX}/include \
            -L${MLX_PREFIX}/lib -lmlx \
            -framework Metal -framework Foundation \
            -Wno-c++20-extensions \
            catboost/mlx/tests/csv_train.cpp -o csv_train

      - name: Compile csv_predict
        run: |
          MLX_PREFIX=$(brew --prefix mlx)
          clang++ -std=c++17 -O2 -I. \
            -I${MLX_PREFIX}/include \
            -L${MLX_PREFIX}/lib -lmlx \
            -framework Metal -framework Foundation \
            -Wno-c++20-extensions \
            catboost/mlx/tests/csv_predict.cpp -o csv_predict

      - name: Compile bench_boosting
        run: |
          MLX_PREFIX=$(brew --prefix mlx)
          clang++ -std=c++17 -O2 -I. \
            -I${MLX_PREFIX}/include \
            -L${MLX_PREFIX}/lib -lmlx \
            -framework Metal -framework Foundation \
            -Wno-c++20-extensions \
            catboost/mlx/tests/bench_boosting.cpp -o bench_boosting

      - name: Compile build_verify_test
        run: |
          MLX_PREFIX=$(brew --prefix mlx)
          clang++ -std=c++17 -O2 -I. \
            -I${MLX_PREFIX}/include \
            -L${MLX_PREFIX}/lib -lmlx \
            -framework Metal -framework Foundation \
            -Wno-c++20-extensions \
            catboost/mlx/tests/build_verify_test.cpp -o build_verify_test

      - name: Verify binaries
        run: |
          test -x ./csv_train || (echo "csv_train not executable" && exit 1)
          test -x ./csv_predict || (echo "csv_predict not executable" && exit 1)
          test -x ./bench_boosting || (echo "bench_boosting not executable" && exit 1)
          test -x ./build_verify_test || (echo "build_verify_test not executable" && exit 1)

      - name: Bundle binaries in package
        run: |
          mkdir -p python/catboost_mlx/bin
          cp csv_train python/catboost_mlx/bin/
          cp csv_predict python/catboost_mlx/bin/
          cp bench_boosting /tmp/bench_boosting

      - name: Bench regression check (binary)
        run: |
          LOSS=$(./bench_boosting --rows 1000 --features 10 --classes 2 --depth 4 --iters 20 --bins 32 --seed 42 2>&1 | grep -oP 'BENCH_FINAL_LOSS=\K[0-9.]+')
          EXPECTED="0.59795737"
          echo "Binary loss: $LOSS (expected: $EXPECTED)"
          python3 -c "assert abs(float('$LOSS') - float('$EXPECTED')) < 1e-4, f'Regression: {$LOSS} vs {$EXPECTED}'"

      - name: Bench regression check (multiclass K=3)
        run: |
          LOSS=$(./bench_boosting --rows 1000 --features 10 --classes 3 --depth 4 --iters 20 --bins 32 --seed 42 2>&1 | grep -oP 'BENCH_FINAL_LOSS=\K[0-9.]+')
          EXPECTED="0.95248461"
          echo "Multiclass K=3 loss: $LOSS (expected: $EXPECTED)"
          python3 -c "assert abs(float('$LOSS') - float('$EXPECTED')) < 1e-4, f'Regression: {$LOSS} vs {$EXPECTED}'"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python package
        run: pip install -e "python/[dev]"

      - name: Lint with ruff
        run: ruff check python/catboost_mlx/ python/tests/

      - name: Depthwise grow-policy regression
        run: |
          python3 -c "
          import csv, random
          random.seed(0)
          rows = 200
          with open('/tmp/dw_smoke.csv', 'w', newline='') as f:
              w = csv.writer(f)
              w.writerow(['f0', 'f1', 'f2', 'f3', 'f4', 'label'])
              for _ in range(rows):
                  feats = [round(random.gauss(0, 1), 4) for _ in range(5)]
                  label = 1 if feats[0] + feats[1] > 0 else 0
                  w.writerow(feats + [label])
          "
          OUTPUT=$(./csv_train /tmp/dw_smoke.csv \
            --target-col 5 \
            --loss Logloss \
            --grow-policy Depthwise \
            --depth 4 \
            --iterations 10 \
            --bins 32 \
            --verbose 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qP 'loss=[0-9]+\.[0-9]+' || (echo "ERROR: no finite loss value in output" && exit 1)
          echo "Depthwise smoke test passed"

      - name: Run tests with coverage
        run: pytest python/tests/ -v --tb=short --cov=catboost_mlx --cov-report=term-missing --cov-fail-under=70
