name: Add macOS extra python environments to cache

on:
  push:
    branches:
      - master

  workflow_dispatch:

jobs:
  add_macos_arm64_extra_env_to_cache:
    name: Add MacOS Arm64 extra env to cache
    runs-on: macos-14
    steps:
      - name: Install pyenv and python versions and pack to zip file
        run: |
          brew install pyenv

          pyenv install 3.9.19
          cd $HOME/.pyenv/versions/ && ln -s 3.9.19 ./3.9
          pyenv install 3.10.14
          cd $HOME/.pyenv/versions/ && ln -s 3.10.14 ./3.10
          pyenv install 3.11.9
          cd $HOME/.pyenv/versions/ && ln -s 3.11.9 ./3.11
          pyenv install 3.12.3
          cd $HOME/.pyenv/versions/ && ln -s 3.12.3 ./3.12
          pyenv install 3.13.1
          cd $HOME/.pyenv/versions/ && ln -s 3.13.1 ./3.13
          pyenv install 3.14.0
          cd $HOME/.pyenv/versions/ && ln -s 3.14.0 ./3.14

          export PYENV_ROOT="$HOME/.pyenv"
          command -v pyenv >/dev/null || export PATH="$PYENV_ROOT/bin:$PATH"
          eval "$(pyenv init --path)"
          eval "$(pyenv init -)"

          for PY_VER in 3.9 3.10 3.11 3.12 3.13 3.14
          do
              pyenv shell $PY_VER
              python -m pip install -U pip numpy
          done

          cd $HOME/.pyenv/versions/ && zip -r -y ${{ github.workspace }}/python_versions_macos_arm64.zip *

      - name: Save to cache
        uses: actions/cache/save@v4
        with:
          enableCrossOsArchive: true # to be used on macOS x86_64 as well
          path: python_versions_macos_arm64.zip
          key: python_versions_macos_arm64-${{ github.run_id }} # Can use time based key as well

  add_macos_x86_64_extra_env_to_cache:
    name: Add MacOS x86_64 extra env to cache
    runs-on: macos-15-intel
    steps:
      - name: Install pyenv and python versions and pack to zip file
        run: |
          brew install openssl@3.0 readline sqlite3 xz zlib tcl-tk@8 libb2

          # pyenv builds cannot handle both openssl@1.1 and openssl@3 installed at the same time
          brew unlink openssl@1.1
          mv /usr/local/opt/openssl@1.1 /usr/local/opt/openssl@1.1.BAK

          brew install pyenv

          export OPENSSL_PATH=$(brew --prefix openssl@3.0)
          export CFLAGS="-I$OPENSSL_PATH/include -I$(brew --prefix bzip2)/include -I$(brew --prefix readline)/include -I$(xcrun --show-sdk-path)/usr/include"
          export LDFLAGS="-L$OPENSSL_PATH/lib -L$(brew --prefix readline)/lib -L$(brew --prefix zlib)/lib -L$(brew --prefix bzip2)/lib"

          export PYTHON_CONFIGURE_OPTS="--with-openssl=$OPENSSL_PATH"

          pyenv install 3.9.19
          cd $HOME/.pyenv/versions/ && ln -s 3.9.19 ./3.9
          pyenv install 3.10.14
          cd $HOME/.pyenv/versions/ && ln -s 3.10.14 ./3.10
          pyenv install 3.11.9
          cd $HOME/.pyenv/versions/ && ln -s 3.11.9 ./3.11
          pyenv install 3.12.3
          cd $HOME/.pyenv/versions/ && ln -s 3.12.3 ./3.12
          pyenv install 3.13.1
          cd $HOME/.pyenv/versions/ && ln -s 3.13.1 ./3.13
          pyenv install 3.14.0
          cd $HOME/.pyenv/versions/ && ln -s 3.14.0 ./3.14

          export PYENV_ROOT="$HOME/.pyenv"
          command -v pyenv >/dev/null || export PATH="$PYENV_ROOT/bin:$PATH"
          eval "$(pyenv init --path)"
          eval "$(pyenv init -)"

          for PY_VER in 3.9 3.10 3.11 3.12 3.13 3.14
          do
              pyenv shell $PY_VER
              python -m pip install -U pip numpy
          done

          cd $HOME/.pyenv/versions/ && zip -r -y ${{ github.workspace }}/python_versions_macos_x86_64.zip *

      - name: Save to cache
        uses: actions/cache/save@v4
        with:
          enableCrossOsArchive: true # to be used on macOS arm64 as well
          path: python_versions_macos_x86_64.zip
          key: python_versions_macos_x86_64-${{ github.run_id }} # Can use time based key as well
