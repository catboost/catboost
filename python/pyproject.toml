[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "catboost-mlx"
version = "0.1.0"
description = "CatBoost gradient boosted decision trees on Apple Silicon via Metal/MLX"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "Apache-2.0"}
dependencies = [
    "numpy>=1.21",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pandas>=1.3",
]

[tool.setuptools.packages.find]
include = ["catboost_mlx*"]
